{% set version = "0.37.0" %}

package:
  name: octave_kernel
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/o/octave_kernel/octave_kernel-{{ version }}.tar.gz
  sha256: 1e1a53ddd1d822ac5513667847566d757930b27f67cc46e226b3c4a2f5231826

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - jupyter-packaging >=0.9,<2
    - metakernel >=0.24.0
    - jupyter_client >=4.3.0
    - ipykernel
    - hatchling >=1.0

  run:
    - python >={{ python_min }}
    - metakernel >=0.24.0
    - jupyter_client >=4.3.0
    - ipykernel

test:
  requires:
    - python {{ python_min }}
  imports:
    - octave_kernel

about:
  home: https://github.com/Calysto/octave_kernel
  license: BSD-3-Clause
  license_file: LICENSE.txt
  summary: A Jupyter kernel for Octave.
  license_family: BSD

extra:
  recipe-maintainers:
    - blink1073
    - ocefpaf
