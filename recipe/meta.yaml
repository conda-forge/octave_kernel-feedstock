{% set version = "1.0.0" %}
{% set python_min = "3.11" %}

package:
  name: octave_kernel
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/o/octave_kernel/octave_kernel-{{ version }}.tar.gz
  sha256: 26172c72f66659c9409180cb27ce66a60b594e451eb60cb87f28f55f69d30d4a

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - metakernel >=1.0
    - jupyter_client >=8.1.0
    - ipykernel >=6.22.0
    - hatchling >=1.5

  run:
    - python >={{ python_min }}
    - metakernel >=1.0.0
    - jupyter_client >=8.1.0
    - ipykernel >=6.22.0

test:
  requires:
    - python {{ python_min }}
  imports:
    - octave_kernel

about:
  home: https://github.com/Calysto/octave_kernel
  license: BSD-3-Clause
  license_file: LICENSE.txt
  summary: A Jupyter kernel for Octave.
  license_family: BSD

extra:
  recipe-maintainers:
    - blink1073
    - ocefpaf
